---
name: CI
permissions: {}

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  setup_release:
    name: Setup Release
    outputs:
      publish_release: ${{ steps.setup_release.outputs.publish_release }}
      release_body: ${{ steps.setup_release.outputs.release_body }}
      release_commit: ${{ steps.setup_release.outputs.release_commit }}
      release_generate_release_notes: ${{ steps.setup_release.outputs.release_generate_release_notes }}
      release_tag: ${{ steps.setup_release.outputs.release_tag }}
      release_version: ${{ steps.setup_release.outputs.release_version }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Setup Release
        id: setup_release
        uses: LizardByte/actions/actions/release_setup@200eaeb897a2b065a65cb6f16b41077432007490  # v2026.605.34721
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  dependency_policy:
    name: Dependency Policy
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6  # v1.16.1
        with:
          cache: true
          cache-on-failure: false

      - name: Install Cargo tools
        run: |
          cargo_run_bin_version="$(
            cargo metadata --locked --no-deps --format-version 1 \
              | sed -n 's/.*"cargo-run-bin"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p'
          )"
          if [[ -z "${cargo_run_bin_version}" ]]; then
            echo "Failed to parse cargo-run-bin version from cargo metadata" >&2
            exit 1
          fi
          cargo install --locked cargo-run-bin --version "${cargo_run_bin_version}"
          cargo bin cargo-deny --version

      - name: Check licenses
        run: cargo bin cargo-deny check licenses

  build:
    name: Build
    needs: setup_release
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/work/_temp/_github_home/.cargo/registry
            ~/work/_temp/_github_home/.cargo/git
            target
          key: ${{ github.job }}-${{ hashFiles('rust-toolchain.toml') }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ github.job }}-${{ hashFiles('rust-toolchain.toml') }}-${{ hashFiles('**/Cargo.lock') }}
            ${{ github.job }}-${{ hashFiles('rust-toolchain.toml') }}-

      - name: Install Cargo tools
        uses: ./ci/github-actions/arch-run
        with:
          command: |
            cargo_run_bin_version="$(
              cargo metadata --locked --no-deps --format-version 1 \
                | sed -n 's/.*"cargo-run-bin"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p'
            )"
            if [[ -z "${cargo_run_bin_version}" ]]; then
              echo "Failed to parse cargo-run-bin version from cargo metadata" >&2
              exit 1
            fi
            cargo install --locked cargo-run-bin --version "${cargo_run_bin_version}"
            if [[ "${{ needs.setup_release.outputs.publish_release }}" == "true" ]]; then
              cargo bin cargo-set-version --version
            fi
            cargo bin cargo-tarpaulin --version

      - name: Update Version
        if: needs.setup_release.outputs.publish_release == 'true'
        uses: ./ci/github-actions/arch-run
        with:
          command: |
            cargo bin cargo-set-version "${{ needs.setup_release.outputs.release_version }}"
            cargo update --workspace
            cargo metadata --locked --no-deps --format-version 1 > /dev/null

      - name: Test
        id: test
        uses: ./ci/github-actions/arch-run
        with:
          command: cargo bin cargo-tarpaulin --locked --engine llvm --out Xml

      - name: Upload coverage
        # any except canceled or skipped
        if: >-
          always() &&
          (steps.test.outcome == 'success' || steps.test.outcome == 'failure') &&
          startsWith(github.repository, 'LizardByte/')
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          disable_search: true
          fail_ci_if_error: true
          files: cobertura.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

      - name: Clippy
        uses: ./ci/github-actions/arch-run
        with:
          command: cargo clippy --locked -- -D warnings

      - name: Install toolchain
        uses: ./ci/github-actions/arch-run
        with:
          command: rustup target add x86_64-unknown-linux-gnu

      - name: Build
        uses: ./ci/github-actions/arch-run
        with:
          command: cargo build --locked --target x86_64-unknown-linux-gnu --release

      - name: Strip all debug symbols
        uses: ./ci/github-actions/arch-run
        with:
          command: strip --strip-all target/x86_64-unknown-linux-gnu/release/build-pacman-repo

      - name: Enable reading of cache
        continue-on-error: true
        uses: ./ci/github-actions/arch-run
        with:
          command: chmod -R a+rwX $HOME/.cargo target

      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: build-pacman-repo-x86_64-unknown-linux-gnu
          path: target/x86_64-unknown-linux-gnu/release/build-pacman-repo

      - name: Create/Update GitHub Release
        if: needs.setup_release.outputs.publish_release == 'true'
        uses: LizardByte/actions/actions/release_create@200eaeb897a2b065a65cb6f16b41077432007490  # v2026.605.34721
        with:
          allowUpdates: false
          artifacts: 'target/x86_64-unknown-linux-gnu/release/build-pacman-repo'
          body: ${{ needs.setup_release.outputs.release_body }}
          generateReleaseNotes: ${{ needs.setup_release.outputs.release_generate_release_notes }}
          name: ${{ needs.setup_release.outputs.release_tag }}
          prerelease: true
          tag: ${{ needs.setup_release.outputs.release_tag }}
          token: ${{ secrets.GH_BOT_TOKEN }}
          virustotal_api_key: ${{ secrets.VIRUSTOTAL_API_KEY }}
